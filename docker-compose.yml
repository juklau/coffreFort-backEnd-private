#       - coffreFort-network
#     # pas de ports exposés: c'est pour builder/runner en CLI

# Volumes nommés pour persistance
volumes:
  mysql-data:
    # driver: local => c'est le driver par défaut

#Réseau pour communication inter-conteneurs
networks:
  coffreFort-network:
    driver: bridge
