# version: '3.8'

services:
  #Service Web PHP Apache (API Slim)
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: coffreFort-web-private
    restart: always
    ports: 
      - "9083:80"
    volumes:
      - ./public:/var/www/html/public
      - ./src:/var/www/html/src
      - ./config:/var/www/html/config
      - ./vendor:/var/www/html/vendor
      - ./php.ini:/usr/local/etc/php/conf.d/custom.ini
      - ./sql:/var/www/html/sql
      - ./storage:/var/www/html/storage 
    env_file:
      - ./.env
    environment:
      DB_HOST: mysql
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - coffreFort-network

  # Service Base de Données MySQL
  mysql:
    image: mysql:8.0
    container_name: coffreFort-db-private
    hostname: mysql
    restart: always
    env_file:
      - ./.env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      TZ: Europe/Paris
    # command séparé du commentaire healthcheck pour éviter l'erreur de parsing YAML
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    # healthcheck : vérifie que MySQL répond avant d'autoriser les autres conteneurs à démarrer
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - mysql-data:/var/lib/mysql
      # Décommenter pour initialiser la BDD au premier démarrage
      # NE PAS décommenter pour le backup/restore (les scripts s'exécutent seulement sur volume vide)
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro

      # init_triggers.sql => importer manuellement
      # - ./sql/init_triggers.sql:/docker-entrypoint-initdb.d/02_init_triggers.sql:ro

      #si ca marche => à supprimer cette partie 
      # - ./sql:/docker-entrypoint-initdb.d:ro
    networks:
      - coffreFort-network

  # Service WebDB (développement uniquement)
  webdb:
    image: webdb/app
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - "$HOME/.ssh:/root/.ssh:ro"
      - "$HOME/.webdb:/usr/src/app/static/version"
    ports:
      - "22071:22071"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - coffreFort-network

volumes:
  mysql-data:

networks:
  coffreFort-network:
    driver: bridge